<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KnGDfA Ai</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Arial, sans-serif; }
  body {
    background: #0f1115;
    color: #eaeaea;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: #1a1d24;
    padding: 14px 16px;
    text-align: center;
    border-bottom: 1px solid #2a2e38;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }
  header h1 {
    font-size: 18px;
    font-weight: 600;
    color: #4dabf7;
  }
  header p {
    font-size: 11px;
    color: #888;
    margin-top: 2px;
  }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .msg {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 14px;
    line-height: 1.4;
    font-size: 14px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .user {
    align-self: flex-end;
    background: #4dabf7;
    color: #0f1115;
    border-bottom-right-radius: 4px;
  }
  .bot {
    align-self: flex-start;
    background: #232733;
    border-bottom-left-radius: 4px;
  }
  .bot.typing {
    color: #999;
    font-style: italic;
  }
  .error {
    align-self: center;
    background: #3a2222;
    color: #ff8a8a;
    font-size: 12px;
    text-align: center;
  }
  #inputBar {
    display: flex;
    padding: 10px;
    gap: 8px;
    background: #1a1d24;
    border-top: 1px solid #2a2e38;
  }
  #inputBar textarea {
    flex: 1;
    resize: none;
    border: none;
    outline: none;
    border-radius: 12px;
    padding: 10px 14px;
    background: #232733;
    color: #eaeaea;
    font-size: 14px;
    max-height: 100px;
  }
  #inputBar button {
    border: none;
    background: #4dabf7;
    color: #0f1115;
    font-weight: 600;
    border-radius: 12px;
    padding: 0 18px;
    font-size: 14px;
    cursor: pointer;
  }
  #inputBar button:disabled {
    background: #555;
    cursor: not-allowed;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
</style>
</head>
<body>

<header>
  <h1>KnGDfA Ai</h1>
  <p>Chat AI sederhana — powered by Llama 3</p>
</header>

<div id="chat"></div>

<div id="inputBar">
  <textarea id="userInput" placeholder="Tulis pesan..." rows="1"></textarea>
  <button id="sendBtn">Kirim</button>
</div>

<script>
  const BACKEND_URL = "https://ai-kang-daffa.vercel.app/api/chat";

  const chat = document.getElementById('chat');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');

  let history = [];

  function addMessage(text, role) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function autoResize() {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 100) + 'px';
  }
  userInput.addEventListener('input', autoResize);

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    addMessage(text, 'user');
    history.push({ role: 'user', content: text });
    userInput.value = '';
    autoResize();
    sendBtn.disabled = true;

    const typingDiv = addMessage('KnGDfA Ai sedang mengetik...', 'bot typing');

    try {
      const res = await fetch(BACKEND_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });

      if (!res.ok) {
        throw new Error('Server error: ' + res.status);
      }

      const data = await res.json();
      const reply = data.reply || 'Maaf, tidak ada balasan dari server.';

      typingDiv.remove();
      addMessage(reply, 'bot');
      history.push({ role: 'assistant', content: reply });

    } catch (err) {
      typingDiv.remove();
      addMessage('Gagal terhubung ke server AI. Cek koneksi internet atau coba lagi nanti.', 'error');
      console.error(err);
    } finally {
      sendBtn.disabled = false;
      userInput.focus();
    }
  }

  sendBtn.addEventListener('click', sendMessage);
  userInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  addMessage('Halo! Aku KnGDfA Ai. Ada yang bisa aku bantu?', 'bot');
</script>

</body>
</html>
